<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coastal-sim-data | Data Inventory</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-brand">
                    <div class="logo"></div>
                    <h1>coastal-sim<span>-data</span></h1>
                    <span class="header-sep"></span>
                    <h2>Forcing Cache Inventory</h2>
                </div>
                <div class="actions">
                    <button id="purgeBtn" class="btn btn-danger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                        Purge Cache
                    </button>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Data List Column -->
                <div class="dataset-column glass-panel">
                    <div class="list-header">
                        <h3>Available Datasets</h3>
                        <span id="datasetCount" class="badge">0</span>
                    </div>
                    <div id="datasetList" class="dataset-list">
                        <!-- Populated via JS -->
                        <div class="loading-state">
                            <div class="spinner"></div>
                            <p>Loading cache artifacts...</p>
                        </div>
                    </div>
                </div>

                <!-- Preview Panel Column -->
                <div class="preview-panel glass-panel">
                    <div class="preview-header">
                        <h3>Interactive Preview</h3>
                    </div>

                    <div id="previewControls" class="preview-controls hidden">
                        <div class="control-group" style="display:flex; gap:8px; align-items:end;">
                            <div style="flex:1;">
                                <label for="varSelect">Surface Field</label>
                                <select id="varSelect" class="form-select">
                                    <option value="u10">Atmospheric U-Wind (u10)</option>
                                    <option value="v10">Atmospheric V-Wind (v10)</option>
                                    <option value="t2m">Atmospheric Temp 2m (t2m)</option>
                                    <option value="u">Ocean U-Velocity (u)</option>
                                    <option value="v">Ocean V-Velocity (v)</option>
                                    <option value="water_u">Ocean U-Velocity (water_u)</option>
                                    <option value="water_v">Ocean V-Velocity (water_v)</option>
                                    <option value="temp">Ocean Temperature (temp)</option>
                                    <option value="salt">Ocean Salinity (salt)</option>
                                    <option value="zeta">Surface Elevation (zeta)</option>
                                    <option value="hs">Significant Wave Height (hs)</option>
                                    <option value="water_level">NOAA Water Level</option>
                                </select>
                            </div>
                        </div>
                        <div id="timeSliderGroup" class="control-group">
                            <label for="timeRange">Time Index (<span id="timeIdxDisplay">0</span>)</label>
                            <input type="range" id="timeRange" min="0" max="48" value="0" class="form-range">
                        </div>
                        <div id="snapshotLabel" class="control-group" style="display:none;">
                            <span style="color:#8b949e; font-size:0.85rem; font-style:italic;" id="snapshotLabelText"></span>
                        </div>
                    </div>

                    <div id="previewCanvas" class="preview-canvas">
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <p>Select a dataset to render map.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script defer src="app.js"></script>
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
    <script type="module" src="preview3d.js"></script>
</body>

</html>
